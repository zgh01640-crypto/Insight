version: '3.9'

services:
  backend:
    build: ./backend
    container_name: insight-backend-prod
    volumes:
      - insight-db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/insight.db
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always

  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: insight-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  insight-db:
