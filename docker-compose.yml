version: '3.9'

services:
  backend:
    build: ./backend
    container_name: insight-backend
    volumes:
      - ./backend:/app          # hot reload
      - insight-db:/app/data    # persistent DB
    environment:
      - DATABASE_URL=sqlite:///./data/insight.db
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: insight-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules        # prevent host override
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  insight-db:
